<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>StyleKart — Category</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:    #C2185B;
    --pink-lt: #FCE4EC;
    --pink-md: #D81B60;
    --gold:    #B8860B;
    --dark:    #1A1218;
    --off:     #FDF8FA;
    --text:    #1A1218;
    --muted:   #6B5B65;
    --border:  #EDD5E0;
    --white:   #FFFFFF;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: var(--white);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    width: 100%;
  }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 5%;
    height: 64px;
    width: 100%;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700;
    color: var(--pink);
    text-decoration: none;
    letter-spacing: -0.5px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--pink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .back-link {
    font-size: 14px; font-weight: 500;
    color: var(--muted); text-decoration: none;
  }
  .back-link:hover { color: var(--pink); }

  .cat-header {
    padding: 50px 5% 30px;
    text-align: center;
  }
  .cat-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3vw, 2.4rem);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .cat-header p { color: var(--muted); }

  .section { padding: 20px 5% 80px; width: 100%; }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }
  .p-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: box-shadow .2s, transform .2s;
    display: flex;
    flex-direction: column;
    width: 100%;
  }
  .p-card:hover { box-shadow: 0 8px 28px rgba(194,24,91,.12); transform: translateY(-3px); }
  .p-card-img { height: 280px; width: 100%; overflow: hidden; position: relative; background: var(--pink-lt); }
  .p-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .p-badge {
    position: absolute; top: 10px; left: 10px; font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px; letter-spacing: .04em; background: var(--pink); color: white;
  }
  .p-card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .p-card-brand { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
  .p-card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; line-height: 1.4; min-height: 42px; }
  .p-card-price { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .p-now { font-size: 18px; font-weight: 700; color: var(--pink); }
  .p-old { font-size: 14px; color: var(--muted); text-decoration: line-through; }
  .p-disc { font-size: 12px; font-weight: 600; color: #2E7D32; }
  .p-buy {
    display: block; width: 100%; padding: 12px; text-align: center;
    background: var(--pink-lt); color: var(--pink); text-decoration: none;
    border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 600;
    transition: all .2s; cursor: pointer;
  }
  .p-buy:hover { background: var(--pink); color: white; }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    max-width: 500px;
    margin: 0 auto;
  }

  footer {
    background: var(--dark); color: rgba(255,255,255,.7); padding: 40px 5%;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; width: 100%;
  }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 18px; color: white; font-weight: 700; }
  .footer-note { font-size: 13px; }

  @media (max-width: 768px) {
    .products-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 0 10px; }
    .p-card-img { height: 250px; }
    footer { flex-direction: column; text-align: center; gap: 15px; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">👗</div>
    StyleKart
  </a>
  <a class="back-link" href="index.html">← Home</a>
</nav>

<div class="cat-header">
  <h1 id="cat-title">Category</h1>
  <p id="cat-subtitle">Best deals curated hain</p>
</div>

<section class="section">
  <div class="products-grid" id="fashion-products"></div>
</section>

<footer>
  <div class="footer-logo">StyleKart 👗</div>
  <div class="footer-note">© 2026 StyleKart · Affiliate links se support karo · No extra charge</div>
</footer>

<script>
  // ==========================================================
  // 👗 YAHAN APNA POORA products ARRAY PASTE KARO
  // (index.html wala hi array copy karke yahan replace karna,
  //  category field ke saath — dono files mein SAME list honi chahiye)
  // ==========================================================
  const products = [
      {
          brand: "Amazon Fashion",
          name: "Women Printed Cotton Kurta",
          image:"71DmAdcf7zL._SY879_.jpg",
          price:"₹454",
          oldPrice:"₹1199",
          discount:"-64% off",
          affiliateLink:"https://amzn.to/3QCaJEl",
          category: "dresses"
      },
      {
          brand:"Amazon India",
          name:"Rythas Women Cotton Printed for Summer",
          image:"61r67q9q9FL._SY879_.jpg",
          price:"₹549",
          oldPrice:"₹2999",
          discount:"-82% off",
          affiliateLink:"https://amzn.to/3QL0o96",
          category: "dresses"
      },
      {
          brand:"Amazon fashion",
          name:"Pistaa Women's kurtas set ",
          image:"81PbkVwt7hL._SY879_ (1).jpg",
          price:"₹775",
          oldPrice:"₹1799",
          discount:"-57% off",
          affiliateLink:"https://amzn.to/3SALkeO",
          category: "Ethnic-Wear"
      },
      {
          brand:"Amazon fashion",
          name:"campus running shoes",
          image:"71RiFU3KvLL._SY695_.jpg",
          price:"₹999",
          oldPrice:"₹1899",
          discount:"-47% off",
          affiliateLink:"https://amzn.to/3SD6dpK",
          category: "footwear"
           
          brand:"Amazon fashion",
          name:"campus men hurricane running shoes",
          image:"61lSvGVT2PL._SY695_.jpg",
          price:"₹999",
          oldPrice:"₹1699",
          discount:"-41% off",
          affiliateLink:"https://amzn.to/44mbNiP",
          category: "footwear"
      }
  ];

  const catNames = {
      "dresses": "👗 Dresses",
      "footwear": "👟 Footwear",
      "handbags": "👜 Handbags",
      "jewellery": "💍 Jewellery",
      "mens-wear": "👕 Men's Wear",
      "winter-wear": "🧥 Winter Wear",
      "beauty": "🧴 Beauty",
      "ethnic-wear": "🩱 Ethnic Wear"
  };

  const params = new URLSearchParams(window.location.search);
  const selectedCat = params.get('cat');

  document.getElementById('cat-title').innerText = catNames[selectedCat] || "All Products";

  const filtered = selectedCat
      ? products.filter(p => p.category === selectedCat)
      : products;

  const productsContainer = document.getElementById('fashion-products');

  if (filtered.length === 0) {
      productsContainer.innerHTML = `<div class="empty-msg">Is category mein abhi koi deal nahi hai. Jald hi add honge — dusri categories check karo!</div>`;
  } else {
      filtered.forEach(product => {
          const cardHTML = `
              <div class="p-card">
                  <div class="p-card-img">
                      <img src="${product.image}" alt="${product.name}">
                      <span class="p-badge">SALE</span>
                  </div>
                  <div class="p-card-body">
                      <div>
                          <div class="p-card-brand">${product.brand}</div>
                          <div class="p-card-name">${product.name}</div>
                      </div>
                      <div>
                          <div class="p-card-price">
                              <span class="p-now">${product.price}</span>
                              <span class="p-old">${product.oldPrice}</span>
                              <span class="p-disc">${product.discount}</span>
                          </div>
                          <a href="${product.affiliateLink}" target="_blank" class="p-buy">Buy Now →</a>
                      </div>
                  </div>
              </div>
          `;
          productsContainer.innerHTML += cardHTML;
      });
  }
</script>

</body>
</html>
