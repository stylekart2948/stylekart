<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleKart - Trending Fashion Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f6fa;
            color: #333;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 10px;
            background: linear-gradient(135deg, #ff7675, #6c5ce7);
            color: white;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        header h1 { margin-bottom: 10px; font-size: 26px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            padding: 15px;
            transition: transform 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 6px;
        }
        .product-card h3 {
            font-size: 16px;
            margin: 15px 0 8px 0;
            color: #2d3436;
        }
        .product-card .price {
            font-weight: bold;
            color: #6c5ce7;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .buy-btn {
            display: inline-block;
            background-color: #ff7675;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            transition: background 0.2s;
            width: 80%;
        }
        .buy-btn:hover { background-color: #e84393; }
    </style>
</head>
<body>

    <header>
        <h1>StyleKart India</h1>
        <p>Best Fashion Affiliate Deals For You</p>
    </header>

    <div class="products-grid" id="fashion-products"></div>

    <script>
        // --- APNE REAL LINKS YAHAN PASTE KAREIN ---
        const products = [
            {
                name: "rythas women cotten printed for summer",
                image: "https://amzn.in/d/0i09i7f7", 
                price: "₹659",
                affiliateLink: "https://amzn.to/3QL0o96" 
            }, 
            {
                name: "rythas women cotten printed for summer",
                image: "https://amzn.in/d/0i09i7f7", // Yeh temporary sahi image hai, baad me aap change kar sakte hain
                price: "₹659",
                affiliateLink: "https://amzn.to/3QL0o96"
            }
        ];

        // Yeh code products ko screen par design ke sath dikhayega
        const productsContainer = document.getElementById('fashion-products');
        if (productsContainer) {
            products.forEach(product => {
                const cardHTML = `
                    <div class="product-card">
                        <img src="${product.image}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p class="price">${product.price}</p>
                        <a href="${product.affiliateLink}" target="_blank" class="buy-btn">Check on Store</a>
                    </div>
                `;
                productsContainer.innerHTML += cardHTML;
            });
        }
    </script>

</body>
</html>
